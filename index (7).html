<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Grid</title>
<style>
body{
  font-family: Arial,sans-serif;
  background:#f0f2f5;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  margin:0;
}
.grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap:20px;
  width:90%;
  max-width:900px;
}
.card{
  background:#fff;
  border-radius:15px;
  padding:20px;
  text-align:center;
  box-shadow:0 10px 20px rgba(0,0,0,0.1);
  transition: transform 0.3s;
}
.card:hover{
  transform: translateY(-10px);
}
.card img{
  width:100%;
  border-radius:10px;
  margin-bottom:10px;
}
</style>
</head>
<body>

<div class="grid">
  <div class="card"><img src="https://i.pravatar.cc/200?img=1" alt="my project"><h3>Project 1</h3></div>
  <div class="card"><img src="https://i.pravatar.cc/200?img=2" alt=""><h3>Project 2</h3></div>
  <div class="card"><img src="https://i.pravatar.cc/200?img=3" alt=""><h3>Project 3</h3></div>
  <div class="card"><img src="https://i.pravatar.cc/200?img=4" alt=""><h3>Project 4</h3></div>
</div>

</body>
</html>
