 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Form</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #66a6ff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin:0;
  }
  .login-form {
    background: #fff;
    padding: 30px;
    border-radius: 15px;
    width: 300px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  }
  .login-form h2 {
    text-align:center;
    margin-bottom:20px;
  }
  .login-form input {
    width: 100%;
    padding: 12px;
    margin:8px 0;
    border-radius: 8px;
    border:1px solid #ccc;
  }
  .login-form button {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#66a6ff;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
  }
  .login-form button:hover{
    background:#547acc;
  }
</style>
</head>
<body>

<div class="login-form">
  <h2>Login</h2>
  <input type="text" placeholder="Username">
  <input type="password" placeholder="Password">
  <button>Login</button>
</div>

</body>
</html>
