<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Form</title>
<style>
body{
  font-family: Arial, sans-serif;
  background: #f0f2f5;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.contact-form{
  background:#fff;
  padding:25px;
  border-radius:15px;
  width:300px;
  box-shadow:0 10px 20px rgba(0,0,0,0.1);
}
.contact-form h2{
  text-align:center;
  margin-bottom:15px;
}
.contact-form input, .contact-form textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
}
.contact-form button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#66a6ff;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}
.contact-form button:hover{
  background:#547acc;
}
</style>
</head>
<body>

<div class="contact-form">
  <h2>Contact Us</h2>
  <input type="text" placeholder="Name">
  <input type="email" placeholder="Email">
  <textarea placeholder="Message" rows="4"></textarea>
  <button>Send</button>
</div>

</body>
</html>
